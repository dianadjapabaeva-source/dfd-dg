<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeNet</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#B0DB9C;
}

nav{
    background:#3ea54f;
    color:rgb(206, 243, 206);
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#logo{
    font-size:24px;
    font-weight:bold;
}

#profileBtn{
    background:white;
    color:#3ea54f;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:15px;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    resize:vertical;
}

.btn{
    background:#3ea54f;
    color:white;
    border:none;
    padding:14px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.btn:hover{
    background:#2d8a3b;
}

.post{
    background:#f5f5f5;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.category{
    color:green;
    font-weight:bold;
    margin-bottom:10px;
}

.deleteBtn{
    margin-top:15px;
    background:#ff4d4d;
}

.deleteBtn:hover{
    background:#e60000;
}

#error{
    color:red;
    margin-top:10px;
    display:none;
}

.hidden{
    display:none;
}

.backBtn{
    margin-bottom:20px;
    display:inline-block;
}

.empty{
    text-align:center;
    color:#666;
    margin-top:30px;
}

</style>
</head>

<body>

<nav>

    <div id="logo">
        SafeNet
    </div>

    <div id="profileBtn">
        Личный кабинет
    </div>

</nav>

<!-- ГЛАВНАЯ -->
<div class="container" id="homePage">

    <h2>Новая публикация</h2>

    <div class="input-group">

        <label>Категория</label>

        <select id="category">

            <option value="">Выберите категорию</option>

            <option value="Кража">
                Кража
            </option>

            <option value="Мошенничество">
                Мошенничество
            </option>

            <option value="Магазин">
                Подозрительный магазин
            </option>

            <option value="Другое">
                Другое
            </option>

        </select>

    </div>

    <div class="input-group">

        <label>Заголовок</label>

        <input type="text" id="title">

    </div>

    <div class="input-group">

        <label>Описание</label>

        <textarea id="content" rows="6"></textarea>

        <div id="wordCount">
            Слов: 0 / 15
        </div>

        <div id="error">
            Минимум 15 слов
        </div>

    </div>

    <button class="btn" onclick="submitPost()">
        Опубликовать
    </button>

    <div id="feed"></div>

</div>

<!-- ЛИЧНЫЙ КАБИНЕТ -->
<div class="container hidden" id="profilePage">

    <button class="btn backBtn" onclick="goHome()">
        ← Назад
    </button>

    <h2>Мои публикации</h2>

    <div id="myPosts"></div>

</div>

<script>

const contentInput = document.getElementById("content");
const wordCount = document.getElementById("wordCount");
const error = document.getElementById("error");

contentInput.addEventListener("input", function(){

    const words = this.value
        .trim()
        .split(/\s+/)
        .filter(word => word.length > 0);

    wordCount.innerText = `Слов: ${words.length} / 15`;

    if(words.length >= 15){
        wordCount.style.color = "green";
    }else{
        wordCount.style.color = "#666";
    }

});

function submitPost(){

    const category = document.getElementById("category").value;
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();

    if(!category || !title || !content){

        alert("Заполните все поля");

        return;
    }

    const words = content
        .split(/\s+/)
        .filter(word => word.length > 0);

    if(words.length < 15){

        error.style.display = "block";

        return;
    }

    error.style.display = "none";

    const post = {

        id: Date.now(),

        category: category,

        title: title,

        content: content

    };

    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    posts.unshift(post);

    localStorage.setItem("posts", JSON.stringify(posts));

    document.getElementById("category").value = "";
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    wordCount.innerText = "Слов: 0 / 15";

    showPosts();

    alert("Публикация добавлена!");

}

function showPosts(){

    const feed = document.getElementById("feed");

    const myPosts = document.getElementById("myPosts");

    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    feed.innerHTML = "";

    myPosts.innerHTML = "";

    if(posts.length === 0){

        feed.innerHTML = `
            <div class="empty">
                Пока публикаций нет
            </div>
        `;

        myPosts.innerHTML = `
            <div class="empty">
                У вас пока нет публикаций
            </div>
        `;

        return;
    }

    posts.forEach(post => {

        const postHTML = `

            <div class="post">

                <div class="category">
                    ${post.category}
                </div>

                <h3>
                    ${post.title}
                </h3>

                <p>
                    ${post.content}
                </p>

                <button
                    class="btn deleteBtn"
                    onclick="deletePost(${post.id})"
                >
                    Удалить
                </button>

            </div>

        `;

        feed.innerHTML += postHTML;

        myPosts.innerHTML += postHTML;

    });

}

function deletePost(id){

    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    posts = posts.filter(post => post.id !== id);

    localStorage.setItem("posts", JSON.stringify(posts));

    showPosts();

}

document.getElementById("profileBtn").onclick = function(){

    document.getElementById("homePage").classList.add("hidden");

    document.getElementById("profilePage").classList.remove("hidden");

};

function goHome(){

    document.getElementById("profilePage").classList.add("hidden");

    document.getElementById("homePage").classList.remove("hidden");

}

showPosts();

</script>

</body>
</html>
